<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
</head>

<body>

<article class="card" data-testid="test-todo-card">

  <div class="header">
    <h2 class="title" data-testid="test-todo-title">
      Build Todo Card UI
    </h2>

    <span 
      class="badge medium"
      data-testid="test-todo-priority"
      aria-label="medium priority task"
    >
      Medium
    </span>
  </div>

  <p data-testid="test-todo-description">
    Complete the todo card assignment.
  </p>

  <div>
    <time 
      data-testid="test-todo-due-date"
      datetime="2026-04-16T18:00:00"
    >
      Due April 16, 2026
    </time>

    <div 
      data-testid="test-todo-time-remaining"
      id="timeRemaining"
      aria-live="polite"
    ></div>
  </div>

  <span 
    data-testid="test-todo-status"
    id="status"
    aria-label="Task status"
  >
    Pending
  </span>

  <ul class="tags" data-testid="test-todo-tags" role="list" style="padding-left: 0px;">
    <li class="tag" data-testid="test-todo-tag-work">work</li>
    <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
  </ul>

  <div class="actions">

    <label>
      <input 
        type="checkbox"
        data-testid="test-todo-complete-toggle"
        id="checkbox"
      />
      Mark as done
    </label>

    <div class="btn-group">
      <button 
        class="edit"
        data-testid="test-todo-edit-button"
        aria-label="Edit task"
        onclick="alert('edit clicked')"
      >
        Edit
      </button>

      <button 
        class="delete"
        data-testid="test-todo-delete-button"
        aria-label="Delete task"
        onclick="alert('Delete clicked')"
      >
        Delete
      </button>
    </div>

  </div>

</article>

<script src="script.js"></script>


</body>
</html>
