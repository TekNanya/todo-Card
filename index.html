<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Todo Card</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<article class="card" data-testid="test-todo-card">

  <!-- NORMAL VIEW -->
  <div id="cardContent">

    <div id="priorityIndicator" data-testid="test-todo-priority-indicator"></div>

    <div class="header">
      <h2 class="title" data-testid="test-todo-title"></h2>

      <span id="priorityText"
        class="badge"
        data-testid="test-todo-priority">
      </span>
    </div>

    <!-- Description -->
    <div id="collapsible" data-testid="test-todo-collapsible-section">
      <p id="descText" data-testid="test-todo-description"></p>
    </div>

    <button 
      id="expandBtn"
      data-testid="test-todo-expand-toggle"
      aria-expanded="false"
      aria-controls="collapsible">
      Show more
    </button>

    <!-- Time -->
    <div class="time-block">
      <time id="dueDateText" data-testid="test-todo-due-date"></time>

      <div id="timeRemaining"
        data-testid="test-todo-time-remaining"
        aria-live="polite"></div>

      <div id="overdue"
        data-testid="test-todo-overdue-indicator">
        Overdue
      </div>
    </div>
  <!-- Actions -->
    <div class="actions">
      <label for="checkbox">
        <input 
          type="checkbox"
          id="checkbox"
          data-testid="test-todo-complete-toggle">
        Done
      </label>

      <div>
        <button id="editBtn" data-testid="test-todo-edit-button">
          Edit
        </button>

        <button data-testid="test-todo-delete-button" onclick="deleteTask()">
          Delete
        </button>
      </div>
    </div>
    <!-- Status -->
    <label for="statusControl">Status:</label>
    <select id="statusControl" data-testid="test-todo-status-control">
      <option>Pending</option>
      <option>In Progress</option>
      <option>Done</option>
    </select>

    <span id="status" data-testid="test-todo-status"></span>

    <!-- Tags -->
    <ul class="tags" data-testid="test-todo-tags">
      <li class="tag" data-testid="test-todo-tag-work">work</li>
      <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
    </ul>


  </div>

  <!-- EDIT FORM -->
  <form id="editForm" data-testid="test-todo-edit-form">

    <label for="editTitle">Title:</label>
    <input type="text" id="editTitle" data-testid="test-todo-edit-title-input">

    <label for="editDesc">Description:</label>
    <textarea id="editDesc" data-testid="test-todo-edit-description-input"></textarea>

    <label for="editPriority">Priority:</label>
    <select id="editPriority" data-testid="test-todo-edit-priority-select">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <label for="editDate">Due Date:</label>
    <input type="datetime-local" id="editDate" data-testid="test-todo-edit-due-date-input">

    <button type="button" data-testid="test-todo-save-button">Save</button>
    <button type="button" data-testid="test-todo-cancel-button">Cancel</button>

  </form>

</article>

<script src="script.js"></script>
</body>
</html>
